# Railway deployment profile
# Link MySQL to your backend: Backend service > Variables > Add Reference > select MySQL service.
# Railway will inject: MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}
# Optional: if CORS errors in production, set APP_CORS_ALLOWED_ORIGINS to your Vercel URL (e.g. https://your-app.vercel.app)
